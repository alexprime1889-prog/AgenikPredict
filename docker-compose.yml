services:
  agenikpredict:
    image: ghcr.io/666ghj/agenikpredict:latest
    # Mirror image (use if primary is slow)
    # image: ghcr.nju.edu.cn/666ghj/agenikpredict:latest
    container_name: agenikpredict
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads